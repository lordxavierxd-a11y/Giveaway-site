<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blox Fruits Giveaway</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d1117;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ADS */
.ad-slot {
    width: 95%;
    max-width: 728px;
    min-height: 90px;
    margin: 15px;
    border: 1px dashed #30363d;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #555;
}

/* MAIN BOX */
.container {
    width: 90%;
    max-width: 480px;
    background: #161b22;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
    color: #58a6ff;
}

/* RULES */
.rules {
    text-align: left;
    margin: 20px 0;
    padding: 15px;
    background: rgba(88,166,255,0.05);
    border-left: 4px solid #58a6ff;
    border-radius: 10px;
}

/* BUTTON */
.submit-btn {
    width: 100%;
    padding: 15px;
    background: #238636;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.submit-btn:hover {
    background: #2ea043;
}

/* FOOTER LINKS */
.footer {
    margin-top: 15px;
    font-size: 12px;
}

.footer a {
    color: #58a6ff;
    text-decoration: none;
}
</style>

</head>
<body>

<!-- 🔥 TOP AD -->
<div class="ad-slot">
    AD SPACE (TOP BANNER)
</div>

<!-- 🎁 MAIN -->
<div class="container">

    <h1>Fruit Giveaway 🎉</h1>
    <p>Win Mythical Blox Fruits</p>

    <!-- RULES -->
    <div class="rules">
        <b>Rules:</b>
        <ul>
            <li>Must subscribe to channel</li>
            <li>Enter correct Roblox username</li>
            <li>Only 1 entry allowed</li>
            <li>No fake entries</li>
        </ul>
    </div>

    <!-- BUTTON -->
    <button class="submit-btn" onclick="openForm()">
        ENTER GIVEAWAY NOW
    </button>

    <!-- LINKS -->
    <div class="footer">
        <a href="about.html">About</a> |
        <a href="privacy.html">Privacy Policy</a>
    </div>

</div>

<!-- 🔥 BOTTOM AD -->
<div class="ad-slot" style="min-height:250px;">
    AD SPACE (SQUARE)
</div>

<!-- SCRIPT -->
<script>
function openForm() {
    let btn = document.querySelector(".submit-btn");
    btn.innerText = "Loading...";

    setTimeout(function(){
        window.open("https://forms.gle/Es3hLAY9VgWcfKrT8", "_blank");
        btn.innerText = "ENTER GIVEAWAY NOW";
    }, 1200);
}
</script>

</body>
</html>
